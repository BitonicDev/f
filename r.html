<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-Depth Frontend Proxy</title>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; background: #1e1e1e; color: white;}
        #ui-bar { padding: 10px; background: #333; display: flex; gap: 10px; }
        #url-input { flex-grow: 1; padding: 8px; border-radius: 4px; border: 1px solid #555; background: #222; color: white;}
        button { padding: 8px 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        #proxy-frame { flex-grow: 1; border: none; width: 100%; background: white; }
        #status { font-size: 0.8em; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="ui-bar">
        <input type="text" id="url-input" placeholder="https://example.com" value="https://example.com">
        <button onclick="navigate()">Go</button>
        <span id="status">Ready</span>
    </div>
    
    <iframe id="proxy-frame"></iframe>

    <script>
        const BACKEND_PROXY = 'http://localhost:3000/proxy?url=';
        const frame = document.getElementById('proxy-frame');
        const statusEl = document.getElementById('status');
        let currentBaseUrl = '';

        // 1. The Core Async Fetch Function
        // The user can define this. By default, it hits our Node.js backend.
        async function customFetch(targetUrl, options = {}) {
            const proxyUrl = BACKEND_PROXY + encodeURIComponent(targetUrl);
            return await fetch(proxyUrl, options);
        }

        // Helper to expose proxy URL generation to the iframe's internal scripts
        window.buildProxyUrl = function(targetUrl) {
            return BACKEND_PROXY + encodeURIComponent(targetUrl);
        };

        // Helper: Convert relative URLs to absolute based on the current context
        function resolveUrl(url, base) {
            try { return new URL(url, base).href; } 
            catch { return url; }
        }

        // Helper: Convert Blob to Base64 (for inline images/fonts)
        function blobToBase64(blob) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        }

        async function navigate() {
            let url = document.getElementById('url-input').value;
            if (!url.startsWith('http')) url = 'https://' + url;
            
            currentBaseUrl = url;
            statusEl.innerText = "Fetching main document...";

            try {
                // Fetch the original HTML
                const response = await customFetch(url);
                const htmlText = await response.text();

                statusEl.innerText = "Parsing and Inlining resources (this may take a moment)...";
                
                // Parse the document BEFORE rendering
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');

                // Update base tag so relative paths parse correctly during our loop
                let baseTag = doc.querySelector('base');
                if (!baseTag) {
                    baseTag = doc.createElement('base');
                    doc.head.insertBefore(baseTag, doc.head.firstChild);
                }
                baseTag.href = url;

                // 2. Pre-Render Resource Inlining
                await inlineResources(doc, url);

                // 3. Inject Overrides for dynamic execution inside the iframe
                injectOverrides(doc, url);

                // 4. Render into the iframe
                statusEl.innerText = "Rendering...";
                frame.contentWindow.document.open();
                frame.contentWindow.document.write(doc.documentElement.outerHTML);
                frame.contentWindow.document.close();
                statusEl.innerText = "Done";

            } catch (err) {
                statusEl.innerText = "Error: " + err.message;
            }
        }

        // Expose navigate function to iframe for link clicks
        window.loadProxyUrl = function(url) {
            document.getElementById('url-input').value = url;
            navigate();
        }

        // --- Core Inlining Logic ---
        async function inlineResources(doc, baseUrl) {
            const promises = [];

            // Inline Scripts
            doc.querySelectorAll('script[src]').forEach(script => {
                const src = resolveUrl(script.getAttribute('src'), baseUrl);
                script.removeAttribute('src'); // Prevent direct loading
                promises.push(
                    customFetch(src)
                        .then(res => res.text())
                        .then(text => { script.textContent = text; })
                        .catch(e => console.warn('Failed to inline script:', src))
                );
            });

            // Inline Stylesheets
            doc.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
                const href = resolveUrl(link.getAttribute('href'), baseUrl);
                const style = doc.createElement('style');
                promises.push(
                    customFetch(href)
                        .then(res => res.text())
                        .then(text => { 
                            style.textContent = text; 
                            link.replaceWith(style);
                        })
                        .catch(e => console.warn('Failed to inline style:', href))
                );
            });

            // Inline Images
            doc.querySelectorAll('img[src]').forEach(img => {
                const src = resolveUrl(img.getAttribute('src'), baseUrl);
                if (src.startsWith('data:')) return;
                
                img.removeAttribute('src'); // Prevent direct load
                promises.push(
                    customFetch(src)
                        .then(res => res.blob())
                        .then(blob => blobToBase64(blob))
                        .then(b64 => { img.setAttribute('src', b64); })
                        .catch(e => console.warn('Failed to inline image:', src))
                );
            });

            // Rewrite Links to avoid escaping the proxy
            doc.querySelectorAll('a[href]').forEach(a => {
                const href = resolveUrl(a.getAttribute('href'), baseUrl);
                if (href.startsWith('http')) {
                    a.setAttribute('href', 'javascript:void(0);');
                    a.setAttribute('onclick', `window.parent.loadProxyUrl('${href}')`);
                }
            });

            // Wait for all fetches to finish before returning the modified DOM
            await Promise.all(promises);
        }

        // --- Iframe Script Injection ---
        function injectOverrides(doc, baseUrl) {
            const script = doc.createElement('script');
            // We inject code as a string to be executed in the iframe's context
            script.textContent = `
                (function() {
                    const BASE_URL = "${baseUrl}";
                    
                    // Helper to resolve URLs
                    function resolve(url) {
                        try { return new URL(url, BASE_URL).href; } 
                        catch { return url; }
                    }

                    // 1. Override Fetch API
                    const origFetch = window.fetch;
                    window.fetch = async function(resource, options) {
                        let url = typeof resource === 'string' ? resource : resource.url;
                        url = resolve(url);
                        // Route through parent's backend proxy
                        const proxiedUrl = window.parent.buildProxyUrl(url);
                        return origFetch.call(this, proxiedUrl, options);
                    };

                    // 2. Override XMLHttpRequest
                    const origOpen = XMLHttpRequest.prototype.open;
                    XMLHttpRequest.prototype.open = function(method, url, ...rest) {
                        const proxiedUrl = window.parent.buildProxyUrl(resolve(url));
                        return origOpen.call(this, method, proxiedUrl, ...rest);
                    };

                    // 3. Handle Dynamic Elements (MutationObserver)
                    // If the page's JS dynamically creates an <img> or <script>, we must intercept it
                    const observer = new MutationObserver((mutations) => {
                        mutations.forEach((mutation) => {
                            mutation.addedNodes.forEach((node) => {
                                if (node.nodeType === 1) { // ELEMENT_NODE
                                    
                                    // Handle dynamically created images
                                    if (node.tagName === 'IMG' && node.src && !node.src.startsWith('data:')) {
                                        const originalSrc = node.src;
                                        node.removeAttribute('src'); // Stop browser from fetching
                                        
                                        // Use parent's customFetch to get it, convert to base64, and set
                                        window.parent.customFetch(resolve(originalSrc))
                                            .then(res => res.blob())
                                            .then(blob => {
                                                const reader = new FileReader();
                                                reader.onload = () => node.src = reader.result;
                                                reader.readAsDataURL(blob);
                                            });
                                    }

                                    // Handle dynamically created links
                                    if (node.tagName === 'A' && node.href && !node.href.startsWith('javascript:')) {
                                        const targetHref = resolve(node.href);
                                        node.setAttribute('href', 'javascript:void(0)');
                                        node.addEventListener('click', () => {
                                            window.parent.loadProxyUrl(targetHref);
                                        });
                                    }

                                    // Note: Dynamically injected <script src="..."> is significantly more complex 
                                    // because executing it requires synchronous blocking or custom eval execution.
                                    // A production proxy handles this via complex getters/setters on Element.prototype.src.
                                }
                            });
                        });
                    });

                    // Start observing the document immediately
                    observer.observe(document.documentElement, { childList: true, subtree: true });
                })();
            `;
            // Insert as the very first script in the head to ensure it runs before page scripts
            doc.head.insertBefore(script, doc.head.firstChild);
        }
    </script>
</body>
</html>
